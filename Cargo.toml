[package]
name = "hematite"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "crates/*"]

[dependencies]
derive_more = { version = "2.1", features = ["deref", "deref_mut"] }
thiserror = "2.0"
uuid = { version = "1.23", features = ["v3", "v4", "v7"] }
hematite_macros = { path = "crates/hematite_macros" }
hematite_utils = { path = "crates/hematite_utils" }
bevy_ecs = "0.19"
